name: Java CI with Maven in Linux

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - java: 11
            additional-maven-args: >-
              -Pcoveralls
              -DrepoToken=${{ secrets.COVERALLS_REPO_TOKEN }}
              -DpullRequest=${{ github.event.pull_request.number }}

    name: Build with Java ${{ matrix.java }} on Linux

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-jdk${{ matrix.java }}-${{ hashFiles('**/pom.xml', '**/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Install xvfb
        run: sudo apt-get install -y xvfb

      - name: Build with Maven
        run: xvfb-run mvn verify -Pjacoco

      - name: Run Coveralls Report
        run: mvn coveralls:report ${{ matrix.additional-maven-args }}
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
